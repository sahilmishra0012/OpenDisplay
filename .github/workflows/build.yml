name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build (arm64)
        run: swift build -c release --arch arm64

      - name: Build (x86_64)
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          mkdir -p build/OpenDisplay.app/Contents/MacOS
          mkdir -p build/OpenDisplay.app/Contents/Resources
          lipo -create \
            .build/arm64-apple-macosx/release/OpenDisplay \
            .build/x86_64-apple-macosx/release/OpenDisplay \
            -output build/OpenDisplay.app/Contents/MacOS/OpenDisplay
          cp Info.plist build/OpenDisplay.app/Contents/
          cp OpenDisplay/Entitlements.plist build/OpenDisplay.app/Contents/Resources/
          if [ -f OpenDisplay/AppIcon.icns ]; then cp OpenDisplay/AppIcon.icns build/OpenDisplay.app/Contents/Resources/; fi
          echo -n "APPL????" > build/OpenDisplay.app/Contents/PkgInfo

      - name: Sign (ad-hoc)
        run: |
          codesign --force --deep --sign - \
            --entitlements OpenDisplay/Entitlements.plist \
            build/OpenDisplay.app

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          cd build && zip -r "OpenDisplay-${VERSION}.zip" OpenDisplay.app
          hdiutil create -volname OpenDisplay -srcfolder OpenDisplay.app -ov -format UDZO "OpenDisplay-${VERSION}.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenDisplay
          path: |
            build/*.zip
            build/*.dmg

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.zip
            build/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
